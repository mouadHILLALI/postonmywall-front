<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <i class="bi bi-broadcast"></i>
    </div>
    <span class="logo-text">PostOnMyWall</span>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard"  routerLinkActive="active" class="nav-item">
      <i class="bi bi-grid-fill nav-icon"></i>
      <span>Dashboard</span>
    </a>
    <a routerLink="/publish"    routerLinkActive="active" class="nav-item">
      <i class="bi bi-send-fill nav-icon"></i>
      <span>Publish</span>
    </a>
    <a routerLink="/accounts"   routerLinkActive="active" class="nav-item">
      <i class="bi bi-link-45deg nav-icon"></i>
      <span>Accounts</span>
    </a>
    <a routerLink="/scheduler"  routerLinkActive="active" class="nav-item">
      <i class="bi bi-calendar3 nav-icon"></i>
      <span>Scheduler</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar">{{ (user$ | async)?.username?.charAt(0)?.toUpperCase() }}</div>
      <div class="user-meta">
        <span class="user-name">{{ (user$ | async)?.username }}</span>
        <span class="user-role">Member</span>
      </div>
    </div>
    <button class="logout-btn" title="Sign out" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>
</aside>
